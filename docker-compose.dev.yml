services:
  # Development-only UI services that run Vite (live reload) instead of the production
  # Nginx+build stack.
  #
  # Usage:
  #   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
  #
  # Then open:
  #   http://localhost:8001  (client 1)
  #   http://localhost:8002  (client 2)

  client_1_ui_dev:
    build:
      context: .
      dockerfile: Dockerfile.ui.dev
      args:
        VITE_CLIENT_ID: client_1
    ports:
      - "8001:5173"
    volumes:
      - ./ui:/app:delegated
      - ui_node_modules:/app/node_modules
    environment:
      - API_HOST=client_1_api:8000
    depends_on:
      - client_1_api
    networks:
      - fedrl_net

  # client_2_ui_dev:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.ui.dev
  #     args:
  #       VITE_CLIENT_ID: client_2
  #   ports:
  #     - "8002:5173"
  #   volumes:
  #     - ./ui:/app:delegated
  #     - ui_node_modules:/app/node_modules
  #   environment:
  #     - API_HOST=client_2_api:8000
  #   depends_on:
  #     - client_2_api

volumes:
  ui_node_modules:
